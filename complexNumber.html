        // Q81
        { text: "The roots of \\(z^3 + 1 = 0\\) are:", options: ["\\(-1, \\frac{1 \\pm i\\sqrt{3}}{2}\\)", "\\(1, \\frac{-1 \\pm i\\sqrt{3}}{2}\\)", "\\(-1, \\frac{-1 \\pm i\\sqrt{3}}{2}\\)", "\\(1, \\frac{1 \\pm i\\sqrt{3}}{2}\\)"], correct: 0 },
        // Q82
        { text: "Factor \\(z^2 + z + 1\\) over complex numbers:", options: ["\\(\\left(z - \\frac{-1 + i\\sqrt{3}}{2}\\right)\\left(z - \\frac{-1 - i\\sqrt{3}}{2}\\right)\\)", "\\(\\left(z - \\frac{1 + i\\sqrt{3}}{2}\\right)\\left(z - \\frac{1 - i\\sqrt{3}}{2}\\right)\\)", "\\((z - i)(z + i)\\)", "\\((z - \\sqrt{3}i)(z + \\sqrt{3}i)\\)"], correct: 0 },
        // Q83
        { text: "Factor \\(z^4 - 1\\) over complex numbers:", options: ["\\((z-1)(z+1)(z-i)(z+i)\\)", "\\((z-1)^2(z+1)^2\\)", "\\((z^2-1)(z^2+1)\\)", "\\((z-1)(z+1)(z^2+1)\\)"], correct: 0 },
        // Q84
        { text: "The roots of \\(z^2 + 4z + 13 = 0\\) are:", options: ["\\(-2 \\pm 3i\\)", "\\(2 \\pm 3i\\)", "\\(-3 \\pm 2i\\)", "\\(3 \\pm 2i\\)"], correct: 0 },
        // Q85
        { text: "A polynomial with roots \\(i\\) and \\(-i\\) is:", options: ["\\(z^2 + 1\\)", "\\(z^2 - 1\\)", "\\(z^2 + i\\)", "\\(z^2 - i\\)"], correct: 0 },
        // Q86
        { text: "A polynomial with roots \\(1+i\\) and \\(1-i\\) is:", options: ["\\(z^2 - 2z + 2\\)", "\\(z^2 + 2z + 2\\)", "\\(z^2 - 2z - 2\\)", "\\(z^2 + 2z - 2\\)"], correct: 0 },
        // Q87
        { text: "Factor \\(z^2 + (2+i)z + 2i\\) over complex numbers:", options: ["\\((z+i)(z+2)\\)", "\\((z-i)(z+2)\\)", "\\((z+2i)(z+1)\\)", "\\((z-2i)(z-1)\\)"], correct: 0 },
        // Q88
        { text: "Solve for \\(z\\): <br> \\( z + \\overline{z} = 4 \\) <br> \\( z - \\overline{z} = 2i \\)", options: ["\\(z = 2 + i\\)", "\\(z = 2 - i\\)", "\\(z = 1 + 2i\\)", "\\(z = 1 - 2i\\)"], correct: 0 },
        // Q89
        { text: "Solve for \\(z\\) and \\(w\\): <br> \\( z + i w = 1 + i \\) <br> \\( i z + w = 1 - i \\)", options: ["\\(z = 1, w = i\\)", "\\(z = 1, w = -i\\)", "\\(z = i, w = 1\\)", "\\(z = -i, w = 1\\)"], correct: 0 },
        // Q90
        { text: "Factor \\(z^3 - 2z^2 + 2z\\) over complex numbers:", options: ["\\(z(z-(1+i))(z-(1-i))\\)", "\\(z(z+(1+i))(z+(1-i))\\)", "\\(z(z-(2+i))(z-(2-i))\\)", "\\(z(z+(2+i))(z+(2-i))\\)"], correct: 0 },
        // Q91
        { text: "The roots of \\(z^4 + 4 = 0\\) are:", options: ["\\(\\pm 1 \\pm i\\)", "\\(\\pm \\sqrt{2} \\pm i\\sqrt{2}\\)", "\\(\\pm 2 \\pm 2i\\)", "\\(\\pm 1 \\pm \\sqrt{2}i\\)"], correct: 0 },

        { text: "Factor \\(z^2 + 6z + 10\\) over complex numbers:", options: ["\\((z+3+i)(z+3-i)\\)", "\\((z-3+i)(z-3-i)\\)", "\\((z+3+2i)(z+3-2i)\\)", "\\((z-3+2i)(z-3-2i)\\)"], correct: 0 },

        { text: "Solve for \\(z\\) and \\(w\\): <br> \\( (1+i)z + (1-i)w = 4 \\) <br> \\( (1-i)z + (1+i)w = 4i \\)", options: ["\\(z = 1+i, w = 1-i\\)", "\\(z = 1-i, w = 1+i\\)", "\\(z = 2, w = 2i\\)", "\\(z = 2i, w = 2\\)"], correct: 0 },

        { text: "Factor \\(z^3 + 2z^2 + z + 2\\) over complex numbers:", options: ["\\((z+2)(z^2+1)\\)", "\\((z-2)(z^2+1)\\)", "\\((z+2)(z^2-1)\\)", "\\((z-2)(z^2-1)\\)"], correct: 0 },

        { text: "Solve for \\(z\\) and \\(w\\): <br> \\( z + w = 2i \\) <br> \\( iz - iw = 2 \\)", options: ["\\(z = 1+i, w = -1+i\\)", "\\(z = 1-i, w = -1-i\\)", "\\(z = 1+i, w = 1-i\\)", "\\(z = -1+i, w = 1+i\\)"], correct: 0 },

        { text: "The roots of \\(z^2 + 2z + 2 = 0\\) are:", options: ["\\(-1 \\pm i\\)", "\\(1 \\pm i\\)", "\\(-2 \\pm i\\)", "\\(2 \\pm i\\)"], correct: 0 },

        { text: "Factor \\(z^2 - 4z + 13\\) over complex numbers:", options: ["\\((z-2+3i)(z-2-3i)\\)", "\\((z+2+3i)(z+2-3i)\\)", "\\((z-3+2i)(z-3-2i)\\)", "\\((z+3+2i)(z+3-2i)\\)"], correct: 0 },
        // Q100
        { text: "If \\(z\\) is a root of \\(z^2 + z + 1 = 0\\), then the value of \\(z^{2024} + z^{2023} + 1\\) is:", options: ["0", "1", "2", "3"], correct: 0 }

    // -------------------------------------------------------------
    // SHUFFLE & RENDER LOGIC
    // -------------------------------------------------------------
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    let shuffledQuestions = [];

    function prepareQuestions() {
        shuffledQuestions = questionsData.map(q => {
            const optArray = q.options.map((opt, idx) => ({ option: opt, originalIndex: idx }));
            shuffleArray(optArray);
            const newOptions = optArray.map(item => item.option);
            const newCorrect = optArray.findIndex(item => item.originalIndex === q.correct);
            return { text: q.text, options: newOptions, correct: newCorrect };
        });
    }

    function renderQuestions() {
        const container = document.getElementById('questionsContainer');
        let html = '';
        shuffledQuestions.forEach((q, index) => {
            const qNum = index + 1;
            html += `<div class="question-block" id="q${qNum}">`;
            html += `<div class="q-header"><span class="q-number">${qNum}.</span> <span class="q-text">${q.text}</span></div>`;
            html += `<div class="options">`;
            const letters = ['A', 'B', 'C', 'D'];
            q.options.forEach((opt, optIndex) => {
                const radioId = `q${qNum}_${optIndex}`;
                html += `<label class="option-label" for="${radioId}" id="label_${radioId}">`;
                html += `<input type="radio" name="q${qNum}" id="${radioId}" value="${optIndex}">`;
                html += `<span class="letter">${letters[optIndex]}.</span> <span>${opt}</span>`;
                html += `</label>`;
            });
            html += `</div></div>`;
        });
        container.innerHTML = html;
        if (window.MathJax && MathJax.Hub) MathJax.Hub.Queue(["Typeset", MathJax.Hub]);
    }

    prepareQuestions();
    renderQuestions();

    // -------------------------------------------------------------
    // HELPER: Clear all highlights
    // -------------------------------------------------------------
    function clearHighlights() {
        document.querySelectorAll('.option-label').forEach(label => {
            label.classList.remove('correct-answer', 'wrong-answer');
        });
    }

    // -------------------------------------------------------------
    // SUBMIT & RESET
    // -------------------------------------------------------------
    function submitTest() {
        clearHighlights(); // remove previous highlights

        let correct = 0, wrong = 0, unattempted = 0;
        const total = shuffledQuestions.length;

        for (let i = 0; i < total; i++) {
            const qNum = i + 1;
            const radios = document.getElementsByName(`q${qNum}`);
            let selected = null;
            for (const radio of radios) {
                if (radio.checked) {
                    selected = parseInt(radio.value);
                    break;
                }
            }

            const correctIdx = shuffledQuestions[i].correct;

            // Highlight correct answer (always green)
            const correctLabel = document.getElementById(`label_q${qNum}_${correctIdx}`);
            if (correctLabel) correctLabel.classList.add('correct-answer');

            // If user selected something
            if (selected !== null) {
                if (selected === correctIdx) {
                    correct++;
                } else {
                    wrong++;
                    // Highlight the wrong selection in red
                    const wrongLabel = document.getElementById(`label_q${qNum}_${selected}`);
                    if (wrongLabel) wrongLabel.classList.add('wrong-answer');
                }
            } else {
                unattempted++;
            }
        }

        const score = correct - 0.25 * wrong;
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        document.getElementById('scoreDisplay').textContent = `${score.toFixed(2)} / ${total}`;
        document.getElementById('detailDisplay').textContent = `You got ${correct} correct, ${wrong} wrong, and ${unattempted} unattempted.`;
        document.getElementById('correctCount').textContent = correct;
        document.getElementById('wrongCount').textContent = wrong;
        document.getElementById('unattemptedCount').textContent = unattempted;

        // Correct-answer distribution
        const posCount = [0, 0, 0, 0];
        shuffledQuestions.forEach(q => { posCount[q.correct]++; });
        document.getElementById('answerStat').innerHTML = `
            <div style="font-size:15px; color:#0f172a;">
                <strong>✅ Correct‑answer distribution:</strong>
                <span class="highlight-correct">A: ${posCount[0]}</span> &nbsp;|&nbsp;
                <span class="highlight-correct">B: ${posCount[1]}</span> &nbsp;|&nbsp;
                <span class="highlight-correct">C: ${posCount[2]}</span> &nbsp;|&nbsp;
                <span class="highlight-correct">D: ${posCount[3]}</span>
                &nbsp;&nbsp;<span style="font-size:13px; color:#64748b;">(shuffled for realism)</span>
            </div>
        `;
        resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function resetTest() {
        document.querySelectorAll('input[type="radio"]').forEach(radio => radio.checked = false);
        clearHighlights();
        document.getElementById('result').style.display = 'none';
        document.getElementById('correctCount').textContent = '0';
        document.getElementById('wrongCount').textContent = '0';
        document.getElementById('unattemptedCount').textContent = '0';
        document.getElementById('scoreDisplay').textContent = '';
        document.getElementById('detailDisplay').textContent = '';
        document.getElementById('answerStat').innerHTML = '';
        prepareQuestions();
        renderQuestions();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
