        { text: "The tangent of the acute angle between the lines \\(y = 2x + 1\\) and \\(y = -x + 3\\) is:", options: ["3", "\\(\\frac{1}{3}\\)", "\\(-\\frac{1}{3}\\)", "-3"], correct: 0 },

        // Q74
        { text: "The equation of a line passing through the intersection of \\(x + y = 1\\) and \\(2x - y = 2\\) and having slope \\(2\\) is:", options: ["\\(y = 2x\\)", "\\(y = 2x - 2\\)", "\\(y = 2x + 2\\)", "\\(y = -2x + 2\\)"], correct: 0 },
        // Q75
        { text: "The area of a triangle can also be expressed as \\(\\frac{1}{2}\\) times the absolute value of the determinant:", options: ["\\(\\begin{vmatrix} x_1 & y_1 & 1 \\\\ x_2 & y_2 & 1 \\\\ x_3 & y_3 & 1 \\end{vmatrix}\\)", "\\(\\begin{vmatrix} x_1 & y_1 \\\\ x_2 & y_2 \\end{vmatrix}\\)", "\\(\\begin{vmatrix} x_1 & y_1 & 0 \\\\ x_2 & y_2 & 0 \\\\ x_3 & y_3 & 0 \\end{vmatrix}\\)", "\\(\\begin{vmatrix} x_1 & x_2 & x_3 \\\\ y_1 & y_2 & y_3 \\end{vmatrix}\\)"], correct: 0 },
        // Q76
        { text: "Three points are collinear if the determinant:", options: ["\\(\\begin{vmatrix} x_1 & y_1 & 1 \\\\ x_2 & y_2 & 1 \\\\ x_3 & y_3 & 1 \\end{vmatrix} = 0\\)", "\\(= 1\\)", "\\(> 0\\)", "\\(< 0\\)"], correct: 0 },
        // Q77
        { text: "The equation of a line with slope \\(0\\) and y-intercept \\(5\\) is:", options: ["\\(y = 5\\)", "\\(x = 5\\)", "\\(y = 0\\)", "\\(x = 0\\)"], correct: 0 },
        // Q78
        { text: "The equation of a line with undefined slope and x-intercept \\(-3\\) is:", options: ["\\(x = -3\\)", "\\(y = -3\\)", "\\(x = 3\\)", "\\(y = 3\\)"], correct: 0 },
        // Q79
        { text: "The distance between \\((2,3)\\) and \\((5,7)\\) is:", options: ["5", "4", "3", "6"], correct: 0 },
        // Q80
        { text: "The midpoint of the segment joining \\((-1,2)\\) and \\((3,-4)\\) is:", options: ["(1,-1)", "(2,-2)", "(1,1)", "(-1,1)"], correct: 0 },
        // Q81
        { text: "The slope of the line through \\((5,2)\\) and \\((5,6)\\) is:", options: ["Undefined", "0", "4", "1"], correct: 0 },
        // Q82
        { text: "The slope of the line through \\((2,7)\\) and \\((4,7)\\) is:", options: ["0", "Undefined", "2", "-2"], correct: 0 },
        // Q83
        { text: "The equation of the line through \\((3, -2)\\) with slope \\(0\\) is:", options: ["\\(y = -2\\)", "\\(x = 3\\)", "\\(y = 3\\)", "\\(x = -2\\)"], correct: 0 },

        { text: "The slope of a line perpendicular to a line with slope \\(-4\\) is:", options: ["\\(\\frac{1}{4}\\)", "\\(-\\frac{1}{4}\\)", "4", "-4"], correct: 0 },

        { text: "The equation of a line perpendicular to \\(y = 3x + 2\\) and passing through the origin is:", options: ["\\(y = -\\frac{1}{3}x\\)", "\\(y = \\frac{1}{3}x\\)", "\\(y = 3x\\)", "\\(y = -3x\\)"], correct: 0 },
        // Q88
        { text: "The angle between lines with slopes \\(1\\) and \\(-1\\) is:", options: ["\\(90^\\circ\\)", "\\(45^\\circ\\)", "\\(0^\\circ\\)", "\\(180^\\circ\\)"], correct: 0 },
        // Q89
        { text: "The angle between lines with slopes \\(2\\) and \\(-\\frac{1}{2}\\) is:", options: ["\\(90^\\circ\\)", "\\(45^\\circ\\)", "\\(60^\\circ\\)", "\\(30^\\circ\\)"], correct: 0 },
        // Q90
        { text: "The area of the triangle formed by the coordinate axes and the line \\(\\frac{x}{a} + \\frac{y}{b} = 1\\) is:", options: ["\\(\\frac{1}{2} |ab|\\)", "\\(|ab|\\)", "\\(\\frac{1}{2} |a+b|\\)", "\\(|a+b|\\)"], correct: 0 },

        { text: "The orthocentre of the triangle with vertices \\((0,0), (a,0), (0,b)\\) is:", options: ["(0,0)", "(a,b)", "(a/2, b/2)", "(a,0)"], correct: 0 },
        // Q92
        { text: "The circumcentre of the triangle with vertices \\((0,0), (a,0), (0,b)\\) is:", options: ["(a/2, b/2)", "(0,0)", "(a,b)", "(a/2, 0)"], correct: 0 },
        // Q93
        { text: "The incenter of the right triangle with vertices \\((0,0), (a,0), (0,b)\\) is:", options: ["\\(\\left(\\frac{a b}{a+b+\\sqrt{a^2+b^2}}, \\frac{a b}{a+b+\\sqrt{a^2+b^2}}\\right)\\)", "(a/2, b/2)", "(0,0)", "(a, b)"], correct: 0 },

        { text: "The intercept form of a line is:", options: ["\\(\\frac{x}{a} + \\frac{y}{b} = 1\\)", "\\(a x + b y = 1\\)", "\\(x + y = a + b\\)", "\\(\\frac{x}{a} - \\frac{y}{b} = 1\\)"], correct: 0 },

        { text: "The slope of a line parallel to \\(3x - 4y + 7 = 0\\) is:", options: ["\\(\\frac{3}{4}\\)", "\\(-\\frac{3}{4}\\)", "\\(\\frac{4}{3}\\)", "\\(-\\frac{4}{3}\\)"], correct: 0 },

        { text: "The slope of a line perpendicular to \\(3x - 4y + 7 = 0\\) is:", options: ["\\(-\\frac{4}{3}\\)", "\\(\\frac{4}{3}\\)", "\\(\\frac{3}{4}\\)", "\\(-\\frac{3}{4}\\)"], correct: 0 },

        { text: "The distance from \\((2,3)\\) to the line \\(4x + 3y - 10 = 0\\) is:", options: ["\\(\\frac{7}{5}\\)", "\\(\\frac{5}{7}\\)", "\\(\\frac{1}{5}\\)", "\\(\\frac{12}{5}\\)"], correct: 0 },
        // Q98
        { text: "The reflection of the point \\((x, y)\\) across the x-axis is:", options: ["(x, -y)", "(-x, y)", "(-x, -y)", "(y, x)"], correct: 0 },

        { text: "The reflection of the point \\((x, y)\\) across the y-axis is:", options: ["(-x, y)", "(x, -y)", "(-x, -y)", "(y, x)"], correct: 0 },

        { text: "The reflection of the point \\((x, y)\\) across the origin is:", options: ["(-x, -y)", "(x, -y)", "(-x, y)", "(y, x)"], correct: 0 }

    // -------------------------------------------------------------
    // SHUFFLE, RENDER, SUBMIT, RESET (same functions as above)
    // -------------------------------------------------------------
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    let shuffledQuestions = [];

    function prepareQuestions() {
        shuffledQuestions = questionsData.map(q => {
            const optArray = q.options.map((opt, idx) => ({ option: opt, originalIndex: idx }));
            shuffleArray(optArray);
            const newOptions = optArray.map(item => item.option);
            const newCorrect = optArray.findIndex(item => item.originalIndex === q.correct);
            return { text: q.text, options: newOptions, correct: newCorrect };
        });
    }

    function renderQuestions() {
        const container = document.getElementById('questionsContainer');
        let html = '';
        shuffledQuestions.forEach((q, index) => {
            const qNum = index + 1;
            html += `<div class="question-block" id="q${qNum}">`;
            html += `<div class="q-header"><span class="q-number">${qNum}.</span> <span class="q-text">${q.text}</span></div>`;
            html += `<div class="options">`;
            const letters = ['A', 'B', 'C', 'D'];
            q.options.forEach((opt, optIndex) => {
                const radioId = `q${qNum}_${optIndex}`;
                html += `<label class="option-label" for="${radioId}" id="label_${radioId}">`;
                html += `<input type="radio" name="q${qNum}" id="${radioId}" value="${optIndex}">`;
                html += `<span class="letter">${letters[optIndex]}.</span> <span>${opt}</span>`;
                html += `</label>`;
            });
            html += `</div></div>`;
        });
        container.innerHTML = html;
        if (window.MathJax && MathJax.Hub) MathJax.Hub.Queue(["Typeset", MathJax.Hub]);
    }

    prepareQuestions();
    renderQuestions();

    function clearHighlights() {
        document.querySelectorAll('.option-label').forEach(label => {
            label.classList.remove('correct-answer', 'wrong-answer');
        });
    }

    function submitTest() {
        clearHighlights();
        let correct = 0, wrong = 0, unattempted = 0;
        const total = shuffledQuestions.length;
        for (let i = 0; i < total; i++) {
            const qNum = i + 1;
            const radios = document.getElementsByName(`q${qNum}`);
            let selected = null;
            for (const radio of radios) {
                if (radio.checked) {
                    selected = parseInt(radio.value);
                    break;
                }
            }
            const correctIdx = shuffledQuestions[i].correct;
            const correctLabel = document.getElementById(`label_q${qNum}_${correctIdx}`);
            if (correctLabel) correctLabel.classList.add('correct-answer');
            if (selected !== null) {
                if (selected === correctIdx) correct++;
                else {
                    wrong++;
                    const wrongLabel = document.getElementById(`label_q${qNum}_${selected}`);
                    if (wrongLabel) wrongLabel.classList.add('wrong-answer');
                }
            } else {
                unattempted++;
            }
        }
        const score = correct - 0.25 * wrong;
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        document.getElementById('scoreDisplay').textContent = `${score.toFixed(2)} / ${total}`;
        document.getElementById('detailDisplay').textContent = `You got ${correct} correct, ${wrong} wrong, and ${unattempted} unattempted.`;
        document.getElementById('correctCount').textContent = correct;
        document.getElementById('wrongCount').textContent = wrong;
        document.getElementById('unattemptedCount').textContent = unattempted;

        const posCount = [0,0,0,0];
        shuffledQuestions.forEach(q => { posCount[q.correct]++; });
        document.getElementById('answerStat').innerHTML = `
            <div style="font-size:15px; color:#0f172a;">
                <strong>✅ Correct‑answer distribution:</strong>
                <span class="highlight-correct">A: ${posCount[0]}</span> &nbsp;|&nbsp;
                <span class="highlight-correct">B: ${posCount[1]}</span> &nbsp;|&nbsp;
                <span class="highlight-correct">C: ${posCount[2]}</span> &nbsp;|&nbsp;
                <span class="highlight-correct">D: ${posCount[3]}</span>
                &nbsp;&nbsp;<span style="font-size:13px; color:#64748b;">(shuffled for realism)</span>
            </div>
        `;
        resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function resetTest() {
        document.querySelectorAll('input[type="radio"]').forEach(radio => radio.checked = false);
        clearHighlights();
        document.getElementById('result').style.display = 'none';
        document.getElementById('correctCount').textContent = '0';
        document.getElementById('wrongCount').textContent = '0';
        document.getElementById('unattemptedCount').textContent = '0';
        document.getElementById('scoreDisplay').textContent = '';
        document.getElementById('detailDisplay').textContent = '';
        document.getElementById('answerStat').innerHTML = '';
        prepareQuestions();
        renderQuestions();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
