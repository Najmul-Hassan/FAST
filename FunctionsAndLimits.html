<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Functions and Limits – 100 MCQs</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f1f5f9;
            padding: 20px;
            color: #0f172a;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px 35px;
            border-radius: 18px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
        }
        h1 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 4px;
            color: #0f172a;
        }
        .subhead {
            text-align: center;
            font-size: 16px;
            color: #475569;
            margin-bottom: 25px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 16px;
        }
        .question-block {
            background: #f8fafc;
            padding: 18px 22px;
            margin-bottom: 16px;
            border-radius: 12px;
            border-left: 6px solid #3b82f6;
            transition: background 0.15s;
        }
        .question-block:hover {
            background: #f1f5f9;
        }
        .q-header {
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 12px;
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .q-number {
            color: #2563eb;
            min-width: 40px;
            font-weight: 700;
        }
        .q-text {
            flex: 1;
            line-height: 1.5;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 25px;
            padding-left: 12px;
        }
        @media (max-width: 650px) {
            .options {
                grid-template-columns: 1fr;
            }
        }
        .option-label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s, border-left 0.2s;
            border-left: 4px solid transparent;
        }
        .option-label:hover {
            background: #e2e8f0;
        }
        .option-label input[type="radio"] {
            accent-color: #2563eb;
            transform: scale(1.15);
            flex-shrink: 0;
        }
        .option-label .letter {
            font-weight: 600;
            color: #334155;
            min-width: 20px;
        }
        .correct-answer {
            background-color: #d4edda !important;
            border-left: 4px solid #28a745 !important;
        }
        .wrong-answer {
            background-color: #f8d7da !important;
            border-left: 4px solid #dc3545 !important;
        }
        .btn-group {
            text-align: center;
            margin: 35px 0 20px;
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 15px 45px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
        }
        .btn:hover {
            background: #1d4ed8;
            transform: scale(1.02);
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-reset {
            background: #64748b;
            box-shadow: 0 6px 16px rgba(100, 116, 139, 0.3);
        }
        .btn-reset:hover {
            background: #475569;
        }
        #result {
            margin-top: 30px;
            padding: 28px 20px;
            background: #f8fafc;
            border-radius: 18px;
            border: 2px solid #cbd5e1;
            display: none;
            text-align: center;
        }
        #result .score {
            font-size: 40px;
            font-weight: 700;
            color: #0f172a;
        }
        #result .detail {
            font-size: 18px;
            margin-top: 8px;
            color: #334155;
        }
        #result .correct {
            color: #16a34a;
        }
        #result .wrong {
            color: #dc2626;
        }
        #result .unattempted {
            color: #6b7280;
        }
        #answerStat {
            margin-top: 16px;
            padding: 14px 20px;
            background: #ffffff;
            border-radius: 12px;
            border: 2px solid #2563eb;
            display: inline-block;
            font-weight: 500;
        }
        #answerStat .highlight-correct {
            font-weight: 700;
            color: #16a34a;
            background: #dcfce7;
            padding: 2px 10px;
            border-radius: 20px;
            margin: 0 2px;
        }
        .footer {
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            margin-top: 30px;
            border-top: 1px solid #e2e8f0;
            padding-top: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📐 Functions and Limits</h1>
        <div class="subhead">

    <script>
        // -------------------------------------------------------------
        // QUESTIONS DATA – 100 MCQs from Functions and Limits
        // Each entry: { text, options: [A, B, C, D], correct: 0..3 }
        // -------------------------------------------------------------
        const questionsData = [
            // Q1: Definition of function
            { text: "A function is a relation in which:", options: ["Each element of domain has a unique image in codomain", "Each element of codomain has a unique pre-image", "Every element of domain has multiple images", "Domain equals codomain"], correct: 0 },
            // Q2: Domain of a function
            { text: "The set of all possible input values for a function is called:", options: ["Range", "Domain", "Codomain", "Image"], correct: 1 },
            // Q3: Range of a function
            { text: "The set of all output values of a function is called:", options: ["Domain", "Codomain", "Range", "Image set"], correct: 2 },
            // Q4: Domain of f(x) = 1/x
            { text: "The domain of \\(f(x) = \\frac{1}{x}\\) is:", options: ["\\(\\mathbb{R}\\)", "\\(\\mathbb{R} \\setminus \\{0\\}\\)", "\\(\\mathbb{R}^+\\)", "\\(\\mathbb{R}^-\\)"], correct: 1 },
            // Q5: Domain of f(x) = sqrt(x)
            { text: "The domain of \\(f(x) = \\sqrt{x}\\) is:", options: ["\\(\\mathbb{R}\\)", "\\((0, \\infty)\\)", "\\([0, \\infty)\\)", "\\((-\\infty, 0]\\)"], correct: 2 },
            // Q6: Range of f(x) = x^2
            { text: "The range of \\(f(x) = x^2\\) is:", options: ["\\(\\mathbb{R}\\)", "\\([0, \\infty)\\)", "\\((-\\infty, 0]\\)", "\\(\\mathbb{R}^+\\)"], correct: 1 },
            // Q7: Range of f(x) = |x|
            { text: "The range of \\(f(x) = |x|\\) is:", options: ["\\(\\mathbb{R}\\)", "\\([0, \\infty)\\)", "\\((-\\infty, 0]\\)", "\\((-1, 1)\\)"], correct: 1 },
            // Q8: Domain of f(x) = sqrt(x-3)
            { text: "The domain of \\(f(x) = \\sqrt{x-3}\\) is:", options: ["\\([3, \\infty)\\)", "\\((3, \\infty)\\)", "\\((-\\infty, 3]\\)", "\\(\\mathbb{R}\\)"], correct: 0 },
            // Q9: Domain of f(x) = 1/(x-2)
            { text: "The domain of \\(f(x) = \\frac{1}{x-2}\\) is:", options: ["\\(\\mathbb{R}\\)", "\\(\\mathbb{R} \\setminus \\{2\\}\\)", "\\(\\mathbb{R} \\setminus \\{-2\\}\\)", "\\((2, \\infty)\\)"], correct: 1 },
            // Q10: Range of f(x) = 2x+1 on R
            { text: "The range of \\(f(x) = 2x + 1\\) on domain \\(\\mathbb{R}\\) is:", options: ["\\(\\mathbb{R}\\)", "\\([1, \\infty)\\)", "\\((-\\infty, 1]\\)", "\\(\\mathbb{R}^+\\)"], correct: 0 },
            // Q11: Domain of f(x) = 1/(x^2-4)
            { text: "The domain of \\(f(x) = \\frac{1}{x^2-4}\\) is:", options: ["\\(\\mathbb{R}\\)", "\\(\\mathbb{R} \\setminus \\{2, -2\\}\\)", "\\(\\mathbb{R} \\setminus \\{2\\}\\)", "\\(\\mathbb{R} \\setminus \\{-2\\}\\)"], correct: 1 },
            // Q12: Range of f(x) = sqrt(x)
            { text: "The range of \\(f(x) = \\sqrt{x}\\) is:", options: ["\\([0, \\infty)\\)", "\\(\\mathbb{R}\\)", "\\(\\mathbb{R}^+\\)", "\\((-\\infty, 0]\\)"], correct: 0 },
            // Q13: Domain of f(x) = ln x
            { text: "The domain of \\(f(x) = \\ln x\\) is:", options: ["\\(\\mathbb{R}\\)", "\\((0, \\infty)\\)", "\\([0, \\infty)\\)", "\\(\\mathbb{R} \\setminus \\{0\\}\\)"], correct: 1 },
            // Q14: Range of f(x) = e^x
            { text: "The range of \\(f(x) = e^x\\) is:", options: ["\\(\\mathbb{R}\\)", "\\((0, \\infty)\\)", "\\([0, \\infty)\\)", "\\(\\mathbb{R}^+\\)"], correct: 1 },
            // Q15: Domain of f(x) = x/(x^2+1)
            { text: "The domain of \\(f(x) = \\frac{x}{x^2+1}\\) is:", options: ["\\(\\mathbb{R}\\)", "\\(\\mathbb{R} \\setminus \\{0\\}\\)", "\\(\\mathbb{R} \\setminus \\{1\\}\\)", "\\(\\mathbb{R} \\setminus \\{-1\\}\\)"], correct: 0 },
            // Q16: Range of f(x) = |x-2|
            { text: "The range of \\(f(x) = |x-2|\\) is:", options: ["\\([0, \\infty)\\)", "\\(\\mathbb{R}\\)", "\\((-\\infty, 0]\\)", "\\((-2, 2)\\)"], correct: 0 },
            // Q17: Domain of f(x) = sqrt(4-x^2)
            { text: "The domain of \\(f(x) = \\sqrt{4-x^2}\\) is:", options: ["\\([-2, 2]\\)", "\\((-2, 2)\\)", "\\((-\\infty, -2] \\cup [2, \\infty)\\)", "\\(\\mathbb{R}\\)"], correct: 0 },
            // Q18: Range of f(x) = 1/x on R\{0}
            { text: "The range of \\(f(x) = \\frac{1}{x}\\) on domain \\(\\mathbb{R}\\setminus\\{0\\}\\) is:", options: ["\\(\\mathbb{R}\\)", "\\(\\mathbb{R} \\setminus \\{0\\}\\)", "\\(\\mathbb{R}^+\\)", "\\(\\mathbb{R}^-\\)"], correct: 1 },
            // Q19: Domain of f(x) = 1/sqrt(x)
            { text: "The domain of \\(f(x) = \\frac{1}{\\sqrt{x}}\\) is:", options: ["\\((0, \\infty)\\)", "\\([0, \\infty)\\)", "\\(\\mathbb{R}\\)", "\\(\\mathbb{R} \\setminus \\{0\\}\\)"], correct: 0 },
            // Q20: Range of f(x) = -x^2
            { text: "The range of \\(f(x) = -x^2\\) is:", options: ["\\((-\\infty, 0]\\)", "\\([0, \\infty)\\)", "\\(\\mathbb{R}\\)", "\\((-\\infty, \\infty)\\)"], correct: 0 },
            // Q21: Domain of f(x) = sqrt(x^2-9)
            { text: "The domain of \\(f(x) = \\sqrt{x^2-9}\\) is:", options: ["\\((-\\infty, -3] \\cup [3, \\infty)\\)", "\\([-3, 3]\\)", "\\((-3, 3)\\)", "\\(\\mathbb{R}\\)"], correct: 0 },
            // Q22: Range of f(x) = 1 - x^2
            { text: "The range of \\(f(x) = 1 - x^2\\) is:", options: ["\\((-\\infty, 1]\\)", "\\([1, \\infty)\\)", "\\(\\mathbb{R}\\)", "\\((-1, 1)\\)"], correct: 0 },
            // Q23: Which is not a function?
            { text: "Which of the following is \\textbf{not} a function from \\(\\mathbb{R}\\) to \\(\\mathbb{R}\\)?", options: ["\\(f(x) = x^2\\)", "\\(f(x) = \\frac{1}{x}\\)", "\\(f(x) = |x|\\)", "\\(f(x) = 2x+3\\)"], correct: 1 },
            // Q24: Well-defined function
            { text: "A function is said to be well-defined if:", options: ["Every element of domain maps to exactly one element of codomain", "Every element of codomain has a pre-image", "Domain equals codomain", "The function is one-one"], correct: 0 },
            // Q25: Vertical line test
            { text: "The vertical line test is used to check whether a relation is:", options: ["One-one", "Onto", "A function", "Invertible"], correct: 2 },

            // Q26: One-one definition
            { text: "A function \\(f: A \\to B\\) is one-one if:", options: ["\\(f(x_1) = f(x_2) \\Rightarrow x_1 = x_2\\)", "\\(f(x_1) \\neq f(x_2) \\Rightarrow x_1 \\neq x_2\\)", "Every element of B has a pre-image", "Domain equals codomain"], correct: 0 },
            // Q27: Onto definition
            { text: "A function \\(f: A \\to B\\) is onto if:", options: ["Every element of B has at least one pre-image in A", "Every element of A has a unique image", "\\(f(A) = B\\)", "\\(f(A) \\subset B\\)"], correct: 0 },
            // Q28: Into function
            { text: "A function \\(f: A \\to B\\) is into if:", options: ["\\(f(A) = B\\)", "\\(f(A) \\subset B\\)", "\\(f(A) \\supset B\\)", "\\(f(A) = A\\)"], correct: 1 },
            // Q29: Many-one function
            { text: "A function \\(f: A \\to B\\) is many-one if:", options: ["Two different elements of A map to the same element of B", "One element of A maps to two different elements of B", "Every element of A maps to distinct elements of B", "\\(f(A) = B\\)"], correct: 0 },
            // Q30: Which is one-one?
            { text: "Which of the following functions from \\(\\mathbb{R}\\) to \\(\\mathbb{R}\\) is one-one?", options: ["\\(f(x) = x^2\\)", "\\(f(x) = |x|\\)", "\\(f(x) = 2x+3\\)", "\\(f(x) = \\sin x\\)"], correct: 2 },
            // Q31: Which is not one-one?
            { text: "Which of the following functions is \\textbf{not} one-one?", options: ["\\(f(x) = 3x-2\\)", "\\(f(x) = x+5\\)", "\\(f(x) = x^3\\)", "\\(f(x) = x^2\\)"], correct: 3 },
            // Q32: Which is onto?
            { text: "Which of the following functions from \\(\\mathbb{R}\\) to \\(\\mathbb{R}\\) is onto?", options: ["\\(f(x) = x^2\\)", "\\(f(x) = |x|\\)", "\\(f(x) = 2x+1\\)", "\\(f(x) = e^x\\)"], correct: 2 },
            // Q33: Which is not onto?
            { text: "Which of the following functions from \\(\\mathbb{R}\\) to \\(\\mathbb{R}\\) is \\textbf{not} onto?", options: ["\\(f(x) = 2x-3\\)", "\\(f(x) = x+1\\)", "\\(f(x) = x^3\\)", "\\(f(x) = x^2\\)"], correct: 3 },
            // Q34: Bijective function
            { text: "A function that is both one-one and onto is called:", options: ["Injective", "Surjective", "Bijective", "Into"], correct: 2 },
            // Q35: f(x)=2x from R to R
            { text: "\\(f: \\mathbb{R} \\to \\mathbb{R}\\) defined by \\(f(x) = 2x\\) is:", options: ["One-one but not onto", "Onto but not one-one", "Both one-one and onto", "Neither one-one nor onto"], correct: 2 },
            // Q36: f(x)=x^2 from R to R
            { text: "\\(f: \\mathbb{R} \\to \\mathbb{R}\\) defined by \\(f(x) = x^2\\) is:", options: ["One-one but not onto", "Onto but not one-one", "Neither one-one nor onto", "Both one-one and onto"], correct: 2 },
            // Q37: f(x)=x^2 from R to [0,∞)
            { text: "\\(f: \\mathbb{R} \\to [0, \\infty)\\) defined by \\(f(x) = x^2\\) is:", options: ["One-one but not onto", "Onto but not one-one", "Both one-one and onto", "Neither one-one nor onto"], correct: 1 },
            // Q38: f(x)=x^2 from [0,∞) to [0,∞)
            { text: "\\(f: [0, \\infty) \\to [0, \\infty)\\) defined by \\(f(x) = x^2\\) is:", options: ["One-one but not onto", "Onto but not one-one", "Both one-one and onto", "Neither one-one nor onto"], correct: 2 },
            // Q39: f(x)=x^3 from R to R
            { text: "\\(f: \\mathbb{R} \\to \\mathbb{R}\\) defined by \\(f(x) = x^3\\) is:", options: ["One-one but not onto", "Onto but not one-one", "Both one-one and onto", "Neither one-one nor onto"], correct: 2 },
            // Q40: Injective means
            { text: "A function is injective if:", options: ["It is one-one", "It is onto", "It is bijective", "It is into"], correct: 0 },
            // Q41: Surjective means
            { text: "A function is surjective if:", options: ["It is one-one", "It is onto", "It is bijective", "It is many-one"], correct: 1 },
            // Q42: sin x from R to [-1,1]
            { text: "\\(f: \\mathbb{R} \\to [-1, 1]\\) defined by \\(f(x) = \\sin x\\) is:", options: ["One-one but not onto", "Onto but not one-one", "Both one-one and onto", "Neither one-one nor onto"], correct: 1 },
            // Q43: e^x from R to R^+
            { text: "\\(f: \\mathbb{R} \\to \\mathbb{R}^+\\) defined by \\(f(x) = e^x\\) is:", options: ["One-one but not onto", "Onto but not one-one", "Both one-one and onto", "Neither one-one nor onto"], correct: 2 },
            // Q44: |x| from R to [0,∞)
            { text: "\\(f: \\mathbb{R} \\to [0, \\infty)\\) defined by \\(f(x) = |x|\\) is:", options: ["One-one but not onto", "Onto but not one-one", "Both one-one and onto", "Neither one-one nor onto"], correct: 1 },
            // Q45: Number of one-one functions
            { text: "The number of one-one functions from a set \\(A\\) with 3 elements to a set \\(B\\) with 4 elements is:", options: ["\\(4^3\\)", "\\(3^4\\)", "\\(4 \\times 3 \\times 2\\)", "\\(4 \\times 3 \\times 2 \\times 1\\)"], correct: 2 },
            // Q46: Number of onto functions
            { text: "The number of onto functions from a set \\(A\\) with 3 elements to a set \\(B\\) with 2 elements is:", options: ["\\(2^3 - 2\\)", "\\(3^2 - 3\\)", "\\(2^3\\)", "\\(3^2\\)"], correct: 0 },
            // Q47: Invertible function
            { text: "A function is invertible if:", options: ["It is one-one", "It is onto", "It is both one-one and onto", "It is into"], correct: 2 },
            // Q48: Which is invertible?
            { text: "Which of the following functions is invertible?", options: ["\\(f: \\mathbb{R} \\to \\mathbb{R}, f(x) = x^2\\)", "\\(f: \\mathbb{R} \\to \\mathbb{R}, f(x) = |x|\\)", "\\(f: \\mathbb{R} \\to \\mathbb{R}, f(x) = 2x+3\\)", "\\(f: \\mathbb{R} \\to \\mathbb{R}, f(x) = \\sin x\\)"], correct: 2 },
            // Q49: One-one is also called
            { text: "A one-one function is also called:", options: ["Injective", "Surjective", "Bijective", "Many-one"], correct: 0 },
            // Q50: Onto is also called
            { text: "An onto function is also called:", options: ["Injective", "Surjective", "Bijective", "Into"], correct: 1 },

            // Q51: Composite function domain
            { text: "If \\(f: A \\to B\\) and \\(g: B \\to C\\), then \\(g \\circ f\\) is a function from:", options: ["\\(A \\to B\\)", "\\(B \\to C\\)", "\\(A \\to C\\)", "\\(C \\to A\\)"], correct: 2 },
            // Q52: Domain of composite
            { text: "The domain of \\(g \\circ f\\) is:", options: ["Domain of f", "Domain of g", "\\(\\{x \\in \\text{dom}(f) : f(x) \\in \\text{dom}(g)\\}\\)", "Range of f"], correct: 2 },
            // Q53: (f∘g)(x) for f=2x, g=x+1
            { text: "If \\(f(x) = 2x\\) and \\(g(x) = x+1\\), then \\((f \\circ g)(x) =\\)", options: ["\\(2x+2\\)", "\\(2x+1\\)", "\\(2x-2\\)", "\\(x+2\\)"], correct: 0 },
            // Q54: (g∘f)(x) for same
            { text: "If \\(f(x) = 2x\\) and \\(g(x) = x+1\\), then \\((g \\circ f)(x) =\\)", options: ["\\(2x+1\\)", "\\(2x+2\\)", "\\(2x-1\\)", "\\(x+2\\)"], correct: 0 },
            // Q55: (f∘g)(x) for f=x^2, g=x+1
            { text: "If \\(f(x) = x^2\\) and \\(g(x) = x+1\\), then \\((f \\circ g)(x) =\\)", options: ["\\((x+1)^2\\)", "\\(x^2+1\\)", "\\(x^2+x+1\\)", "\\(x^2+2x+2\\)"], correct: 0 },
            // Q56: (f∘g)(x) for sin and x^2
            { text: "If \\(f(x) = \\sin x\\) and \\(g(x) = x^2\\), then \\((f \\circ g)(x) =\\)", options: ["\\(\\sin(x^2)\\)", "\\((\\sin x)^2\\)", "\\(\\sin^2 x\\)", "\\(\\sin x \\cdot x^2\\)"], correct: 0 },
            // Q57: Inverse property
            { text: "If \\(f: A \\to B\\) is bijective, then \\(f^{-1}: B \\to A\\) is such that:", options: ["\\(f^{-1}(f(x)) = x\\)", "\\(f(f^{-1}(x)) = x\\)", "Both A and B", "\\(f^{-1}(x) = f(x)\\)"], correct: 2 },
            // Q58: Inverse of 2x+3
            { text: "The inverse of \\(f(x) = 2x+3\\) is:", options: ["\\(f^{-1}(x) = \\frac{x-3}{2}\\)", "\\(f^{-1}(x) = \\frac{x+3}{2}\\)", "\\(f^{-1}(x) = 2x-3\\)", "\\(f^{-1}(x) = \\frac{x}{2}-3\\)"], correct: 0 },
            // Q59: Inverse of x^3
            { text: "The inverse of \\(f(x) = x^3\\) is:", options: ["\\(f^{-1}(x) = x^{1/3}\\)", "\\(f^{-1}(x) = x^3\\)", "\\(f^{-1}(x) = \\frac{1}{x^3}\\)", "\\(f^{-1}(x) = -x^3\\)"], correct: 0 },
            // Q60: Inverse of 1/x
            { text: "The inverse of \\(f(x) = \\frac{1}{x}\\) for \\(x \\neq 0\\) is:", options: ["\\(f^{-1}(x) = x\\)", "\\(f^{-1}(x) = \\frac{1}{x}\\)", "\\(f^{-1}(x) = -x\\)", "\\(f^{-1}(x) = x^2\\)"], correct: 1 },
            // Q61: (f∘f^{-1})(x)
            { text: "If \\(f\\) is invertible, then \\((f \\circ f^{-1})(x) =\\)", options: ["\\(x\\)", "\\(f(x)\\)", "\\(f^{-1}(x)\\)", "\\(0\\)"], correct: 0 },
            // Q62: (f^{-1}∘f)(x)
            { text: "If \\(f\\) is invertible, then \\((f^{-1} \\circ f)(x) =\\)", options: ["\\(x\\)", "\\(f(x)\\)", "\\(f^{-1}(x)\\)", "\\(0\\)"], correct: 0 },
            // Q63: Inverse of x^2 for x≥0
            { text: "If \\(f(x) = x^2\\) for \\(x \\ge 0\\), then \\(f^{-1}(x) =\\)", options: ["\\(\\sqrt{x}\\)", "\\(-\\sqrt{x}\\)", "\\(\\pm \\sqrt{x}\\)", "\\(x^2\\)"], correct: 0 },

            { text: "\\(\\lim_{x \\to 1} \\frac{x^3 - 1}{x - 1} =\\)", options: ["1", "2", "3", "0"], correct: 2 },
            // Q75: lim_{x→0} x/|x|
            { text: "\\(\\lim_{x \\to 0} \\frac{x}{|x|}\\) is:", options: ["1", "-1", "Does not exist", "0"], correct: 2 },

            { text: "Left hand limit \\(\\lim_{x \\to a^-} f(x)\\) means x approaches a from:", options: ["The left side (values less than a)", "The right side (values greater than a)", "Both sides", "Undefined"], correct: 0 },

            { text: "Right hand limit \\(\\lim_{x \\to a^+} f(x)\\) means x approaches a from:", options: ["The left side (values less than a)", "The right side (values greater than a)", "Both sides", "Undefined"], correct: 1 },

            { text: "\\(\\lim_{x \\to 0^+} \\frac{1}{x} =\\)", options: ["\\(\\infty\\)", "\\(-\\infty\\)", "0", "1"], correct: 0 },

            { text: "If \\(\\lim_{x \\to a} f(x) = \\infty\\), then the function has:", options: ["A finite limit", "An infinite limit", "No limit", "A removable discontinuity"], correct: 1 },

            { text: "\\(\\lim_{x \\to \\infty} \\frac{1}{x} =\\)", options: ["0", "1", "\\(\\infty\\)", "-1"], correct: 0 },

            { text: "\\(\\lim_{x \\to \\infty} \\frac{x^2 + 1}{x^2 - 1} =\\)", options: ["0", "1", "\\(\\infty\\)", "-1"], correct: 1 },

            { text: "\\(\\lim_{x \\to \\infty} \\frac{2x^3 + x}{x^3 - 1} =\\)", options: ["0", "1", "2", "\\(\\infty\\)"], correct: 2 },

            // Q86: Continuity definition

        // -------------------------------------------------------------
        // SHUFFLE & RENDER LOGIC
        // -------------------------------------------------------------
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        let shuffledQuestions = [];

        function prepareQuestions() {
            shuffledQuestions = questionsData.map(q => {
                const optArray = q.options.map((opt, idx) => ({ option: opt, originalIndex: idx }));
                shuffleArray(optArray);
                const newOptions = optArray.map(item => item.option);
                const newCorrect = optArray.findIndex(item => item.originalIndex === q.correct);
                return { text: q.text, options: newOptions, correct: newCorrect };
            });
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            let html = '';
            shuffledQuestions.forEach((q, index) => {
                const qNum = index + 1;
                html += `<div class="question-block" id="q${qNum}">`;
                html += `<div class="q-header"><span class="q-number">${qNum}.</span> <span class="q-text">${q.text}</span></div>`;
                html += `<div class="options">`;
                const letters = ['A', 'B', 'C', 'D'];
                q.options.forEach((opt, optIndex) => {
                    const radioId = `q${qNum}_${optIndex}`;
                    html += `<label class="option-label" for="${radioId}" id="label_${radioId}">`;
                    html += `<input type="radio" name="q${qNum}" id="${radioId}" value="${optIndex}">`;
                    html += `<span class="letter">${letters[optIndex]}.</span> <span>${opt}</span>`;
                    html += `</label>`;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html;
            if (window.MathJax && MathJax.Hub) MathJax.Hub.Queue(["Typeset", MathJax.Hub]);
        }

        prepareQuestions();
        renderQuestions();

        // Clear highlights helper
        function clearHighlights() {
            document.querySelectorAll('.option-label').forEach(label => {
                label.classList.remove('correct-answer', 'wrong-answer');
            });
        }

        // -------------------------------------------------------------
        // SUBMIT FUNCTION
        // -------------------------------------------------------------
        function submitTest() {
            clearHighlights();

            let correct = 0,
                wrong = 0,
                unattempted = 0;
            const total = shuffledQuestions.length;

            for (let i = 0; i < total; i++) {
                const qNum = i + 1;
                const radios = document.getElementsByName(`q${qNum}`);
                let selected = null;
                for (const radio of radios) {
                    if (radio.checked) {
                        selected = parseInt(radio.value);
                        break;
                    }
                }

                const correctIdx = shuffledQuestions[i].correct;
                const correctLabel = document.getElementById(`label_q${qNum}_${correctIdx}`);
                if (correctLabel) correctLabel.classList.add('correct-answer');

                if (selected !== null) {
                    if (selected === correctIdx) {
                        correct++;
                    } else {
                        wrong++;
                        const wrongLabel = document.getElementById(`label_q${qNum}_${selected}`);
                        if (wrongLabel) wrongLabel.classList.add('wrong-answer');
                    }
                } else {
                    unattempted++;
                }
            }

            const score = correct - 0.25 * wrong;
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            document.getElementById('scoreDisplay').textContent = `${score.toFixed(2)} / ${total}`;
            document.getElementById('detailDisplay').textContent = `You got ${correct} correct, ${wrong} wrong, and ${unattempted} unattempted.`;
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('wrongCount').textContent = wrong;
            document.getElementById('unattemptedCount').textContent = unattempted;

            // Distribution
            const posCount = [0, 0, 0, 0];
            shuffledQuestions.forEach(q => { posCount[q.correct]++; });
            document.getElementById('answerStat').innerHTML = `
                <div style="font-size:15px; color:#0f172a;">
                    <strong>✅ Correct‑answer distribution:</strong>
                    <span class="highlight-correct">A: ${posCount[0]}</span> &nbsp;|&nbsp;
                    <span class="highlight-correct">B: ${posCount[1]}</span> &nbsp;|&nbsp;
                    <span class="highlight-correct">C: ${posCount[2]}</span> &nbsp;|&nbsp;
                    <span class="highlight-correct">D: ${posCount[3]}</span>
                    &nbsp;&nbsp;<span style="font-size:13px; color:#64748b;">(shuffled for realism)</span>
                </div>
            `;
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // -------------------------------------------------------------
        // RESET FUNCTION
        // -------------------------------------------------------------
        function resetTest() {
            document.querySelectorAll('input[type="radio"]').forEach(radio => radio.checked = false);
            clearHighlights();
            document.getElementById('result').style.display = 'none';
            document.getElementById('correctCount').textContent = '0';
            document.getElementById('wrongCount').textContent = '0';
            document.getElementById('unattemptedCount').textContent = '0';
            document.getElementById('scoreDisplay').textContent = '';
            document.getElementById('detailDisplay').textContent = '';
            document.getElementById('answerStat').innerHTML = '';
            prepareQuestions();
            renderQuestions();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
