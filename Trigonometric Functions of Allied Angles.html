        h1 {

            text-align: center;
            margin-bottom: 4px;
        }
        .subhead {
            text-align: center;
            font-size: 16px;
            color: #475569;
            margin-bottom: 25px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 16px;
        }
        .question-block {
            background: #f8fafc;
            padding: 18px 22px;
            margin-bottom: 16px;
            border-radius: 12px;
            border-left: 6px solid #3b82f6;
            transition: background 0.15s;
        }
        .question-block:hover {
            background: #f1f5f9;
        }
        .q-header {
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 12px;
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .q-number {
            color: #2563eb;
            min-width: 40px;
            font-weight: 700;
        }
        .q-text {
            flex: 1;
            line-height: 1.5;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 25px;
            padding-left: 12px;
        }
        @media (max-width: 650px) {
            .options {
                grid-template-columns: 1fr;
            }
        }
        .option-label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s, border-left 0.2s;
            border-left: 4px solid transparent;
        }
        .option-label:hover {
            background: #e2e8f0;
        }
        .option-label input[type="radio"] {
            accent-color: #2563eb;
            transform: scale(1.15);
            flex-shrink: 0;
        }
        .option-label .letter {
            font-weight: 600;
            color: #334155;
            min-width: 20px;
        }
        .correct-answer {
            background-color: #d4edda !important;
            border-left: 4px solid #28a745 !important;
        }
        .wrong-answer {
            background-color: #f8d7da !important;
            border-left: 4px solid #dc3545 !important;
        }
        .btn-group {
            text-align: center;
            margin: 35px 0 20px;
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 15px 45px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
        }
        .btn:hover {
            background: #1d4ed8;
            transform: scale(1.02);
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-reset {
            background: #64748b;
            box-shadow: 0 6px 16px rgba(100, 116, 139, 0.3);
        }
        .btn-reset:hover {
            background: #475569;
        }
        #result {
            margin-top: 30px;
            padding: 28px 20px;
            background: #f8fafc;
            border-radius: 18px;
            border: 2px solid #cbd5e1;
            display: none;
            text-align: center;
        }

            font-size: 40px;
            font-weight: 700;
            color: #0f172a;
        }
        #result .detail {
            font-size: 18px;
            margin-top: 8px;
            color: #334155;
        }
        #result .correct {
            color: #16a34a;
        }
        #result .wrong {
            color: #dc2626;
        }
        #result .unattempted {
            color: #6b7280;
        }

            margin-top: 16px;
            padding: 14px 20px;
            background: #ffffff;
            border-radius: 12px;
            border: 2px solid #2563eb;

            color: #16a34a;
            background: #dcfce7;
            padding: 2px 10px;
            border-radius: 20px;
            margin: 0 2px;

            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            margin-top: 30px;
            border-top: 1px solid #e2e8f0;
            padding-top: 18px;

        // -------------------------------------------------------------
        // SHUFFLE & RENDER LOGIC
        // -------------------------------------------------------------
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        let shuffledQuestions = [];

        function prepareQuestions() {
            shuffledQuestions = questionsData.map(q => {
                const optArray = q.options.map((opt, idx) => ({ option: opt, originalIndex: idx }));
                shuffleArray(optArray);
                const newOptions = optArray.map(item => item.option);
                const newCorrect = optArray.findIndex(item => item.originalIndex === q.correct);
                return { text: q.text, options: newOptions, correct: newCorrect };
            });
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            let html = '';
            shuffledQuestions.forEach((q, index) => {
                const qNum = index + 1;
                html += `<div class="question-block" id="q${qNum}">`;
                html += `<div class="q-header"><span class="q-number">${qNum}.</span> <span class="q-text">${q.text}</span></div>`;
                html += `<div class="options">`;
                const letters = ['A', 'B', 'C', 'D'];
                q.options.forEach((opt, optIndex) => {
                    const radioId = `q${qNum}_${optIndex}`;
                    html += `<label class="option-label" for="${radioId}" id="label_${radioId}">`;
                    html += `<input type="radio" name="q${qNum}" id="${radioId}" value="${optIndex}">`;
                    html += `<span class="letter">${letters[optIndex]}.</span> <span>${opt}</span>`;
                    html += `</label>`;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html;
            if (window.MathJax && MathJax.Hub) MathJax.Hub.Queue(["Typeset", MathJax.Hub]);
        }

        prepareQuestions();
        renderQuestions();

        // Clear highlights helper
        function clearHighlights() {
            document.querySelectorAll('.option-label').forEach(label => {
                label.classList.remove('correct-answer', 'wrong-answer');
            });
        }

        // Submit
        function submitTest() {
            clearHighlights();

            let correct = 0,
                wrong = 0,
                unattempted = 0;
            const total = shuffledQuestions.length;

            for (let i = 0; i < total; i++) {
                const qNum = i + 1;
                const radios = document.getElementsByName(`q${qNum}`);
                let selected = null;
                for (const radio of radios) {
                    if (radio.checked) {
                        selected = parseInt(radio.value);
                        break;
                    }
                }

                const correctIdx = shuffledQuestions[i].correct;
                const correctLabel = document.getElementById(`label_q${qNum}_${correctIdx}`);
                if (correctLabel) correctLabel.classList.add('correct-answer');

                if (selected !== null) {
                    if (selected === correctIdx) {
                        correct++;
                    } else {
                        wrong++;
                        const wrongLabel = document.getElementById(`label_q${qNum}_${selected}`);
                        if (wrongLabel) wrongLabel.classList.add('wrong-answer');
                    }
                } else {
                    unattempted++;
                }
            }

            const score = correct - 0.25 * wrong;
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            document.getElementById('scoreDisplay').textContent = `${score.toFixed(2)} / ${total}`;
            document.getElementById('detailDisplay').textContent = `You got ${correct} correct, ${wrong} wrong, and ${unattempted} unattempted.`;
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('wrongCount').textContent = wrong;
            document.getElementById('unattemptedCount').textContent = unattempted;

            // Distribution
            const posCount = [0, 0, 0, 0];
            shuffledQuestions.forEach(q => { posCount[q.correct]++; });
            document.getElementById('answerStat').innerHTML = `
                <div style="font-size:15px; color:#0f172a;">
                    <strong>✅ Correct‑answer distribution:</strong>
                    <span class="highlight-correct">A: ${posCount[0]}</span> &nbsp;|&nbsp;
                    <span class="highlight-correct">B: ${posCount[1]}</span> &nbsp;|&nbsp;
                    <span class="highlight-correct">C: ${posCount[2]}</span> &nbsp;|&nbsp;
                    <span class="highlight-correct">D: ${posCount[3]}</span>
                    &nbsp;&nbsp;<span style="font-size:13px; color:#64748b;">(shuffled for realism)</span>
                </div>
            `;
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // Reset
        function resetTest() {
            document.querySelectorAll('input[type="radio"]').forEach(radio => radio.checked = false);
            clearHighlights();
            document.getElementById('result').style.display = 'none';
            document.getElementById('correctCount').textContent = '0';
            document.getElementById('wrongCount').textContent = '0';
            document.getElementById('unattemptedCount').textContent = '0';
            document.getElementById('scoreDisplay').textContent = '';
            document.getElementById('detailDisplay').textContent = '';
            document.getElementById('answerStat').innerHTML = '';
            prepareQuestions();
            renderQuestions();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
